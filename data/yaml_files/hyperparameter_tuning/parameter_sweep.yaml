program: data/yaml_files/hyperparameter_tuning/sweep_lr_bs.py
project: parameter_sweeping
name: parameter_sweeping
method: grid

metric:
  name: val_mean_loss
  goal: minimize

parameters:
  lr:
    values: [0.001, 0.005, 0.01]
  batch_size:
    values: [64, 32, 16]
  
command:
  - ${env}
  - ${interpreter}
  - ${program}