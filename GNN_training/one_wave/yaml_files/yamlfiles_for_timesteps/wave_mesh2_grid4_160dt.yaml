schema_version: v0.6.0
dataset_version: v0.1.0

output:
  variables:
    static: [grid_index, static_feature]
    state: [time, grid_index, state_feature, ensemble_member]
    
  coord_ranges:
    time:
      start: 0
      end: 6.20608808913512

  chunking:
    state_feature: 1
    ensemble_member: 20
    time: 6
    grid_index: 2562
    static_feature: 3
      
  splitting:
    dim: ensemble_member 
    splits:
      train:
        start: 100
        end: 599
        compute_statistics:
          ops: [mean, std, diff_mean, diff_std]
          dims: [grid_index, time, ensemble_member]
      val:
        start: 0
        end: 49 
      test:
        start: 50
        end: 99

inputs:
  wave_sphere:
    path: GNN_training/one_wave/nc_files/wave_200_160dt_g4_sigamin6_sigmax12_correctTmax_600members.nc
    dims: [time, grid_index, ensemble_member]
    variables:
      - u
    dim_mapping:
      time:
        method: rename
        dim: time
      grid_index:
        method: rename
        dim: grid_index
      ensemble_member:
        method: rename
        dim: ensemble_member
      state_feature:
        method: stack_variables_by_var_name
        name_format: "{var_name}"
    target_output_variable: state

  wave_sphere_static:
    path: GNN_training/one_wave/nc_files/wave_200_160dt_g4_sigamin6_sigmax12_correctTmax_600members.nc
    dims: [grid_index]
    variables:
      - x_static
      - y_static
      - z_static
    dim_mapping:
      grid_index:
        method: rename
        dim: grid_index
      static_feature:
        method: stack_variables_by_var_name
        name_format: "{var_name}"
    target_output_variable: static

extra: 
  projection:
    class_name: PlateCarree
    kwargs: {}
    