schema_version: v0.6.0
dataset_version: v0.1.0

output:
  variables:
    state: [time, grid_index, state_feature]
  coord_ranges:
    time: 
      start: 0
      end: 10
  chunking:
    time: 1
  splitting:
    dim: time
    splits:
      train:
        start: 0
        end: 7 # 70%
        compute_statistics:
          ops: [mean, std, diff_mean, diff_std]
          dims: [grid_index, time]
      val:
        start: 7
        end: 8.5  # 85%
      test:
        start: 8.5
        end: 10

inputs:
  wave_sphere:
    path: "C:\\Users\\maria\\OneDrive - Danmarks Tekniske Universitet\\Kandidat\\Speciale\\Code\\wave_sphere_data.nc"
    dims: [time, grid_index]
    variables:
      - u
    dim_mapping:
      time:
        method: rename
        dim: time
      grid_index:
        method: rename
        dim: grid_index
      state_feature:
        method: stack_variables_by_var_name
        name_format: "{var_name}"
    target_output_variable: state

